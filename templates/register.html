{% extends "base.html" %}

{% block title %}Comet — Register{% endblock %}

{% block extra_css %}
<style>
  body {
    /* studio cyclorama — matches login.html */
    background:
      radial-gradient(78% 52% at 50% 40%, rgba(255,255,255,0.60), transparent 70%),
      linear-gradient(180deg, #e8ebef 0%, #eff2f5 48%, #f6f8fa 60%, #e8ebef 100%) fixed !important;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 2rem 1rem;
    overflow-y: auto;
  }
  .login-logo {
    width: clamp(150px, 30vw, 210px);
    height: auto;
    margin-bottom: 1.5rem;
    filter:
      drop-shadow(0 26px 64px rgba(13, 22, 40, 0.22))
      drop-shadow(0 10px 28px rgba(13, 22, 40, 0.14));
  }
  /* fixed top bar with the small brand mark — matches login.html */
  .auth-topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 1rem clamp(1rem, 4vw, 2rem);
    z-index: 10;
  }
  .auth-topbar .brand {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
  }
  .auth-topbar .brand img {
    height: 22px;
    width: auto;
    display: block;
  }
  @media (max-width: 480px) {
    .auth-topbar { padding: 0.8rem 1rem; }
    body { padding-top: 4rem; }
  }
  .login-welcome {
    font-family: var(--font-family-base);
    font-size: clamp(2rem, 5vw, 2.75rem);
    font-weight: 400;
    color: #0B1E33;
    margin-bottom: 2.5rem;
    text-align: center;
    text-shadow: 0 2px 10px rgba(13, 22, 40, 0.18);
  }
  .login-card {
    background: linear-gradient(180deg, var(--comet-navy-mid) 0%, var(--comet-dark) 100%) !important;
    width: clamp(300px, 90vw, 480px);
    padding: clamp(2rem, 5vw, 3rem);
    border-radius: 22px !important;
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow:
      0 30px 70px rgba(13, 22, 40, 0.35),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }
  .login-card-title {
    font-family: var(--font-family-base);
    font-size: clamp(1.6rem, 4vw, 2.1rem);
    font-weight: 600;
    letter-spacing: 0.2px;
    color: rgba(255, 255, 255, 0.95);
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .login-card .form-label {
    color: rgba(224, 231, 240, 0.62);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 0.35rem;
  }
  .login-card .form-control {
    background-color: #FFFFFF;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 0.85rem;
    font-size: 0.95rem;
    color: #0B1E33;
  }
  .login-card .form-control:focus {
    background-color: #FFFFFF;
    border-color: var(--comet-blue);
    box-shadow: 0 0 0 3px rgba(87, 197, 228, 0.25);
  }
  .login-card .btn-primary {
    background: linear-gradient(180deg, var(--comet-blue) 0%, var(--comet-blue-dark) 100%) !important;
    border: none !important;
    color: #FFFFFF !important;
    font-family: var(--font-family-base) !important;
    font-weight: 800 !important;
    border-radius: 9999px;
    padding: 0.75rem;
    font-size: 1rem;
    width: 100%;
    margin-top: 0.5rem;
    box-shadow:
      0 8px 20px rgba(13, 22, 40, 0.28),
      inset 0 1px 0 rgba(255, 255, 255, 0.22) !important;
    transition: transform 0.15s, filter 0.2s, box-shadow 0.2s;
  }
  .login-card .btn-primary:hover {
    filter: brightness(1.06);
    transform: translateY(-2px);
    box-shadow:
      0 12px 26px rgba(13, 22, 40, 0.34),
      inset 0 1px 0 rgba(255, 255, 255, 0.24) !important;
  }
  .login-card .btn-primary:hover,
  .login-card .btn-primary:focus,
  .login-card .btn-primary:active {
    font-family: var(--font-family-base) !important;
    font-weight: 800 !important;
  }
  .login-card .text-muted {
    color: #A0B0C0 !important;
  }
</style>
{% endblock %}

{% block content %}

<header class="auth-topbar">
  <a class="brand" href="{{ url_for('index') }}" aria-label="Comet home">
    <img src="{{ url_for('static', filename='images/comet_logo.svg') }}" alt="Comet">
  </a>
</header>

{% if gate_required %}

<img src="{{ url_for('static', filename='images/comet_logo.svg') }}" alt="Comet logo" class="login-logo" fetchpriority="high">

<h1 class="login-welcome">Restricted access</h1>

<div class="card login-card">
  <h2 class="login-card-title">Enter access code</h2>
  <form id="gateForm">
    <div class="mb-3">
      <label for="gatePassword" class="form-label">Access code</label>
      <input type="password" class="form-control" id="gatePassword" name="gatePassword" required autofocus>
    </div>
    <button type="submit" class="btn btn-primary w-100">Unlock</button>
  </form>
  <div id="gateError" class="alert alert-danger mt-3" style="display: none;"></div>
  <div class="text-center mt-3">
    <p class="text-muted"><a href="{{ url_for('login') }}" class="text-white">Back to login</a></p>
  </div>
</div>

<script>
document.getElementById('gateForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const response = await csrfFetch('/register', {
        method: 'POST',
        body: JSON.stringify({ gate_password: document.getElementById('gatePassword').value })
    });
    const data = await response.json();
    if (data.success) {
        window.location.reload();
    } else {
        document.getElementById('gateError').textContent = data.error || 'Incorrect access code';
        document.getElementById('gateError').style.display = 'block';
    }
});
</script>

{% else %}

<img src="{{ url_for('static', filename='images/comet_logo.svg') }}" alt="Comet logo" class="login-logo" fetchpriority="high">

<h1 class="login-welcome">Create your account</h1>

<div class="card login-card">
  <h2 class="login-card-title">Join Comet</h2>
  <form id="registerForm">
    <div class="mb-3">
      <label for="fullName" class="form-label">Full Name</label>
      <input type="text" class="form-control" id="fullName" name="full_name" autocomplete="name" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" name="email" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" name="password" required>
    </div>
    <div class="mb-3">
      <label for="confirmPassword" class="form-label">Confirm Password</label>
      <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Register</button>
  </form>
  <div id="errorMessage" class="alert alert-danger mt-3" style="display: none;"></div>
  <div id="successMessage" class="alert alert-success mt-3" style="display: none;"></div>
  <div class="text-center mt-3">
    <p class="text-muted"><a href="{{ url_for('login') }}" class="text-white">Back to login</a></p>
  </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
        document.getElementById('errorMessage').textContent = 'Passwords do not match';
        document.getElementById('errorMessage').style.display = 'block';
        return;
    }

    if (password.length < 6) {
        document.getElementById('errorMessage').textContent = 'Password must be at least 6 characters long';
        document.getElementById('errorMessage').style.display = 'block';
        return;
    }

    const formData = {
        full_name: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        password: password
    };

    try {
        const response = await csrfFetch('/register', {
            method: 'POST',
            body: JSON.stringify(formData)
        });

        const data = await response.json();
        if (data.success) {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').textContent = 'Registration successful! Redirecting...';
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(() => {
                window.location.href = data.redirect;
            }, 1000);
        } else {
            document.getElementById('errorMessage').textContent = data.error || 'Registration failed';
            document.getElementById('errorMessage').style.display = 'block';
        }
    } catch (error) {
        document.getElementById('errorMessage').textContent = 'An error occurred. Please try again.';
        document.getElementById('errorMessage').style.display = 'block';
    }
});
</script>

{% endif %}

{% endblock %}
