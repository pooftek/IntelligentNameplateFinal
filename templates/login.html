{% extends "base.html" %}

{% block title %}Comet — Login{% endblock %}

{% block extra_css %}
<style>
  body {
    /* studio cyclorama — matches landing.html (radial highlight over light-grey linear) */
    background:
      radial-gradient(78% 52% at 50% 40%, rgba(255,255,255,0.60), transparent 70%),
      linear-gradient(180deg, #e8ebef 0%, #eff2f5 48%, #f6f8fa 60%, #e8ebef 100%) fixed !important;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 2rem 1rem;
    overflow-y: auto;
  }
  .login-logo {
    width: clamp(150px, 30vw, 210px);
    height: auto;
    margin-bottom: 1.5rem;
    /* same soft fade stack as landing's .wordmark */
    filter:
      drop-shadow(0 26px 64px rgba(13, 22, 40, 0.22))
      drop-shadow(0 10px 28px rgba(13, 22, 40, 0.14));
  }
  .login-welcome {
    font-family: var(--font-family-base);
    font-size: clamp(2rem, 5vw, 2.75rem);
    font-weight: 400;
    color: #0B1E33;
    margin-bottom: 2.5rem;
    text-align: center;
    /* soft slogan-style shadow — same light treatment as the logo above */
    text-shadow: 0 2px 10px rgba(13, 22, 40, 0.18);
  }
  .login-card {
    /* keep navy, but top-lit gradient + depth so it reads 3D like the studio cards */
    background: linear-gradient(180deg, var(--comet-navy-mid) 0%, var(--comet-dark) 100%) !important;
    width: clamp(300px, 90vw, 480px);
    padding: clamp(2rem, 5vw, 3rem);
    border-radius: 22px !important;
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow:
      0 30px 70px rgba(13, 22, 40, 0.35),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }
  .login-card-title {
    font-family: var(--font-family-base);
    font-size: clamp(1.6rem, 4vw, 2.1rem);
    font-weight: 600;
    letter-spacing: 0.2px;
    color: rgba(255, 255, 255, 0.95);
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .login-card .form-label {
    color: rgba(224, 231, 240, 0.62);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 0.35rem;
  }
  .login-card .form-control {
    background-color: #FFFFFF;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 0.85rem;
    font-size: 0.95rem;
    color: #0B1E33;
  }
  .login-card .form-control:focus {
    background-color: #FFFFFF;
    border-color: var(--comet-blue);
    box-shadow: 0 0 0 3px rgba(87, 197, 228, 0.25);
  }
  .login-card .btn-primary {
    /* flat blue pill — no glow; !important re-asserts font + shadow past comet.css `form button` */
    background: linear-gradient(180deg, var(--comet-blue) 0%, var(--comet-blue-dark) 100%) !important;
    border: none !important;
    color: #FFFFFF !important;
    font-family: var(--font-family-base) !important;
    font-weight: 800 !important;
    border-radius: 9999px;
    padding: 0.75rem;
    font-size: 1rem;
    width: 100%;
    margin-top: 0.5rem;
    box-shadow:
      0 8px 20px rgba(13, 22, 40, 0.28),
      inset 0 1px 0 rgba(255, 255, 255, 0.22) !important;
    transition: transform 0.15s, filter 0.2s, box-shadow 0.2s;
  }
  .login-card .btn-primary:hover {
    filter: brightness(1.06);
    transform: translateY(-2px);
    box-shadow:
      0 12px 26px rgba(13, 22, 40, 0.34),
      inset 0 1px 0 rgba(255, 255, 255, 0.24) !important;
  }
  /* comet.css `form .btn:hover/:focus/:active` forces Inter 400 — re-assert our font past it */
  .login-card .btn-primary:hover,
  .login-card .btn-primary:focus,
  .login-card .btn-primary:active {
    font-family: var(--font-family-base) !important;
    font-weight: 800 !important;
  }
  .login-card .text-muted {
    color: #A0B0C0 !important;
  }
  /* responsive top bar — back to landing (left) + student sign-in (right) */
  .auth-topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 1rem clamp(1rem, 4vw, 2rem);
    z-index: 10;
  }
  .auth-topbar .topbar-left {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
  }
  /* small brand mark, top-left — matches landing's .brand (22px) */
  .auth-topbar .brand {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
  }
  .auth-topbar .brand img {
    height: 22px;
    width: auto;
    display: block;
  }
  /* light 3D pill — modeled on landing's .btn-demo */
  .auth-topbar .back-link {
    color: var(--comet-navy);
    text-decoration: none;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 0.55rem 1.25rem;
    border-radius: 9999px;
    background: linear-gradient(180deg, #ffffff 0%, #e6ebf1 100%);
    border: 1px solid rgba(13, 22, 40, 0.12);
    box-shadow:
      0 8px 22px rgba(13, 22, 40, 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.9);
    transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s, filter 0.2s;
  }
  .auth-topbar .back-link:hover {
    transform: translateY(-1px);
    filter: brightness(1.02);
    border-color: rgba(87, 197, 228, 0.6);
    box-shadow:
      0 12px 28px rgba(13, 22, 40, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.9);
  }
  /* navy 3D pill — modeled on landing's .btn-members; stands out for nameplate-free demos */
  .auth-topbar .student-link {
    color: #FFFFFF;
    text-decoration: none;
    font-weight: 800;
    font-size: 0.95rem;
    padding: 0.55rem 1.25rem;
    border-radius: 9999px;
    background: linear-gradient(180deg, #213755 0%, #0d1628 100%);
    box-shadow:
      0 6px 16px rgba(13, 22, 40, 0.22),
      inset 0 1px 0 rgba(255, 255, 255, 0.14);
    transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
  }
  .auth-topbar .student-link:hover {
    transform: translateY(-1px);
    filter: brightness(1.08);
    box-shadow:
      0 10px 22px rgba(13, 22, 40, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.18);
  }
  @media (max-width: 480px) {
    .auth-topbar { padding: 0.8rem 1rem; }
    /* the big centered logo already brands the page — free the bar for the pills */
    .auth-topbar .brand { display: none; }
    body { padding-top: 4rem; }
  }

  /* ── Shooting comets (from the landing hero) ── */
  .meteors {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }
  .meteor {
    position: absolute;
    top: -8%;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #8b94a0;
    box-shadow: 0 0 8px 1px rgba(120, 130, 142, 0.55);
    transform: rotate(215deg);
    animation: meteor linear infinite;
    opacity: 0;
  }
  .meteor::before {
    content: '';
    position: absolute;
    top: 50%; left: 0;
    transform: translateY(-50%);
    width: 90px; height: 2px;
    background: linear-gradient(90deg, rgba(120, 130, 142, 0.7), transparent);
  }
  @keyframes meteor {
    0%   { transform: rotate(215deg) translateX(0);      opacity: 0; }
    8%   { opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: rotate(215deg) translateX(-900px); opacity: 0; }
  }
  /* keep the login content above the comets */
  .login-logo, .login-welcome, .login-card { position: relative; z-index: 1; }
  @media (prefers-reduced-motion: reduce) { .meteors { display: none; } }
</style>
{% endblock %}

{% block content %}

<div class="meteors" aria-hidden="true">
  <span class="meteor" style="left: 10%; animation-delay: 0.0s; animation-duration: 4.2s;"></span>
  <span class="meteor" style="left: 24%; animation-delay: 1.6s; animation-duration: 5.0s;"></span>
  <span class="meteor" style="left: 38%; animation-delay: 0.8s; animation-duration: 3.6s;"></span>
  <span class="meteor" style="left: 56%; animation-delay: 2.4s; animation-duration: 4.8s;"></span>
  <span class="meteor" style="left: 70%; animation-delay: 0.3s; animation-duration: 5.4s;"></span>
  <span class="meteor" style="left: 84%; animation-delay: 3.1s; animation-duration: 4.0s;"></span>
  <span class="meteor" style="left: 92%; animation-delay: 1.1s; animation-duration: 4.6s;"></span>
  <span class="meteor" style="left: 16%; animation-delay: 3.6s; animation-duration: 4.4s;"></span>
  <span class="meteor" style="left: 48%; animation-delay: 4.2s; animation-duration: 3.8s;"></span>
  <span class="meteor" style="left: 64%; animation-delay: 5.0s; animation-duration: 4.1s;"></span>
  <span class="meteor" style="left: 4%;  animation-delay: 2.3s; animation-duration: 4.6s;"></span>
  <span class="meteor" style="left: 20%; animation-delay: 5.6s; animation-duration: 4.5s;"></span>
</div>

<header class="auth-topbar">
  <div class="topbar-left">
    <a class="brand" href="{{ url_for('index') }}" aria-label="Comet home">
      <img src="{{ url_for('static', filename='images/comet_logo.svg') }}" alt="Comet">
    </a>
    <a class="back-link" href="{{ url_for('index') }}">&larr; Back to landing</a>
  </div>
  <a class="student-link" href="{{ url_for('student_interface') }}">Student sign-in &rarr;</a>
</header>

<img src="{{ url_for('static', filename='images/comet_logo.svg') }}" alt="Comet logo" class="login-logo" fetchpriority="high">

<h1 class="login-welcome">Welcome</h1>

<div class="card login-card">
  <h2 class="login-card-title">Login to Comet</h2>
  <form id="loginForm">
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>
  <div id="errorMessage" class="alert alert-danger mt-3" style="display: none;"></div>
  <div class="text-center mt-3">
    <p class="text-muted mb-1"><a href="{{ url_for('forgot_password') }}" class="text-white">Forgot Password?</a></p>
    <p class="text-muted mb-1"><a href="{{ url_for('register') }}" class="text-white">Register Here</a></p>
    <p class="text-muted mb-0"><a href="{{ url_for('student_interface') }}" class="text-white">Student sign-in</a></p>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const response = await csrfFetch('/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
    });
    const data = await response.json();
    if (data.success) {
        window.location.href = data.redirect;
    } else {
        document.getElementById('errorMessage').textContent = data.error || 'Login failed';
        document.getElementById('errorMessage').style.display = 'block';
    }
});
</script>

{% endblock %}
