<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Comet — Student Nameplate</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/comet.css') }}">
    <style>
        :root {
            --comet-navy: #0D1628;
            --comet-navy-mid: #1A2D4A;
            --comet-blue: #57C5E4;
            --comet-blue-dark: #3BA8C8;
            --faculty-gradient: linear-gradient(135deg, var(--comet-navy) 0%, var(--comet-navy-mid) 100%);
        }
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .np-root {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        .np-screen {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-width: 0;
        }
        .faculty-bg {
            background: var(--faculty-gradient);
            min-height: 100%;
        }
        #npBack {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            position: relative;
            isolation: isolate;
        }
        /* Peer rating: only on student-facing (back) screen — not full dual-monitor viewport */
        #npBack .peer-participation-backdrop {
            position: absolute;
            inset: 0;
            z-index: 2990;
            background: rgba(0, 0, 0, 0.45);
            pointer-events: auto;
        }
        #npBack #peerParticipationModal {
            position: absolute !important;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            z-index: 3000;
        }
        #npBack #peerParticipationModal .modal-dialog {
            max-height: calc(100% - 2rem);
            overflow-y: auto;
        }
        #backGlobalStatus.session-top {
            background-color: #0B1E33;
            color: #FFFFFF;
            border-bottom: none;
        }
        .sleep-layer {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 50;
            cursor: pointer;
            touch-action: manipulation;
        }
        .np-root.state-login .sleep-layer,
        .np-root.state-home .sleep-layer,
        .np-root.state-session .sleep-layer {
            display: none;
        }
        .panel-hidden { display: none !important; }

        /* Login state */
        .back-inner-login {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-height: 0;
            padding: 2rem 1rem;
            overflow-y: auto;
            background: #FFFFFF;
            font-family: 'Inter', 'Nunito', sans-serif;
        }
        .login-logo {
            width: clamp(120px, 30vw, 180px);
            height: auto;
            margin-bottom: 2rem;
        }
        .login-welcome {
            font-family: 'Open Sans', sans-serif;
            font-size: clamp(1.75rem, 4vw, 2.25rem);
            font-weight: 400;
            color: #0B1E33;
            margin-bottom: 2rem;
            text-align: center;
        }
        .login-card {
            background-color: #0B1E33 !important;
            width: clamp(300px, 90vw, 450px);
            padding: clamp(2rem, 5vw, 2.5rem);
            border-radius: 14px !important;
            border: none;
        }
        .login-card-title {
            font-family: 'Open Sans', sans-serif;
            font-size: clamp(1.4rem, 3.5vw, 1.9rem);
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .login-card .form-label {
            color: #E0E0E0;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }
        .login-card .form-control {
            background-color: #FFFFFF;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            font-size: 0.95rem;
            color: #0B1E33;
        }
        .login-card .form-control:focus {
            background-color: #FFFFFF;
            border-color: var(--comet-blue);
            box-shadow: 0 0 0 3px rgba(87, 197, 228, 0.25);
        }
        .btn-primary-gradient {
            background-color: var(--comet-blue) !important;
            border: none !important;
            border-radius: 10px;
            padding: 0.7rem;
            color: #FFFFFF !important;
            font-weight: 700;
            width: 100%;
            font-size: 1rem;
            margin-top: 0.5rem;
        }
        .btn-primary-gradient:hover { background-color: var(--comet-blue-dark) !important; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(87,197,228,0.35) !important; }

        /* Front: blank login */
        .front-login-blank { width: 100%; height: 100%; }

        /* Name display (home + session front): black on white */
        .np-root.state-home .np-front,
        .np-root.state-session .np-front {
            background: #fff !important;
        }
        .front-name-display {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            min-height: 100%;
            padding: clamp(0.5rem, 2vmin, 1.25rem);
            text-align: center;
            background: #fff;
            box-sizing: border-box;
            overflow: visible;
        }
        .front-name-display .name-text {
            font-weight: bold;
            color: #000;
            line-height: 1.05;
            white-space: nowrap;
            width: 100%;
            max-width: 100%;
            margin: 0;
            box-sizing: border-box;
            display: block;
        }

        /* My Classes (faculty dashboard clone) */
        .back-inner-home {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #FFFFFF;
            font-family: 'Inter', 'Nunito', sans-serif;
        }
        .dashboard-header {
            flex-shrink: 0;
            background-color: #0B1E33;
            padding: 2rem 1.5rem 1.25rem;
        }
        .dashboard-header .container { max-width: 1200px; margin: 0 auto; }
        .responsive-title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: bold;
            white-space: nowrap;
            line-height: 1.2;
            margin: 0;
        }
        .header-buttons { display: flex; gap: 0.5rem; align-items: center; flex-shrink: 0; }
        .header-buttons .btn { height: 38px; display: inline-flex; align-items: center; padding: 0.375rem 0.75rem; }
        .btn-logout-home {
            background-color: #57C5E4;
            color: #FFFFFF;
            border-radius: 9999px;
            border: none;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn-logout-home:hover { background-color: #3BA8C8; color: #FFFFFF; }
        .dashboard-content {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding: 1rem;
            padding-bottom: clamp(4rem, 15vh, 8rem);
        }
        .dashboard-content::-webkit-scrollbar { width: 12px; }
        .dashboard-content::-webkit-scrollbar-thumb { background: #2A1A40; border-radius: 6px; }
        .row > [class*='col-'] { display: flex; padding-left: 20px; padding-right: 20px; }
        .class-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            margin-bottom: clamp(30px, 5vw, 40px);
            height: clamp(170px, 22vh, 200px);
            min-height: 170px;
            display: flex;
            flex-direction: column;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: none;
        }
        .class-card:active { transform: scale(0.98); }
        .class-card .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            min-height: 0;
        }
        .class-card .card-title {
            font-size: clamp(1.25rem, 2.8vw, 1.75rem);
            font-weight: bold;
            margin-bottom: 0;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.4;
        }
        .class-card .class-code {
            font-size: clamp(0.875rem, 1.9vw, 1.125rem);
            margin-bottom: 0.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .class-card .status-badge {
            margin-top: auto;
            align-self: flex-start;
            font-size: clamp(0.7rem, 1.4vw, 0.8rem);
            padding: clamp(0.2rem, 0.45vw, 0.35rem) clamp(0.45rem, 0.9vw, 0.7rem);
        }
        .class-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .class-card.class-card-inactive {
            opacity: 0.95;
        }
        .class-card.class-card-inactive:hover {
            transform: translateY(-3px);
        }

        /* In-class session back */
        .back-inner-session {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: #fff;
            color: #212529;
            position: relative;
            font-family: 'Inter', 'Nunito', sans-serif;
        }
        .session-main {
            flex: 1;
            min-height: 0;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        /* Full-screen poll (back only) — matches faculty chart colors */
        .back-poll-fs {
            position: absolute;
            inset: 0;
            z-index: 60;
            background: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Inter', 'Nunito', sans-serif;
        }
        .back-poll-fs .back-poll-q {
            flex-shrink: 0;
            padding: clamp(1rem, 3vw, 1.75rem) clamp(1rem, 3vw, 2rem);
            font-size: clamp(1.35rem, 4.2vw, 2.25rem);
            font-weight: 700;
            color: #0B1E33;
            line-height: 1.25;
            border-bottom: 2px solid #e5e7eb;
        }
        .back-poll-fs .back-poll-opts {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            gap: 0;
        }
        .back-poll-fs .poll-opt-btn {
            flex: 1;
            min-height: 3.5rem;
            border: none;
            font-size: clamp(1.15rem, 3.2vw, 1.85rem);
            font-weight: 600;
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            transition: filter 0.12s ease, transform 0.08s ease;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .back-poll-fs .poll-opt-btn:active {
            filter: brightness(0.92);
            transform: scale(0.995);
        }
        .back-poll-fs .poll-opt-btn:disabled {
            opacity: 0.85;
            cursor: default;
        }
        .back-poll-fs .back-poll-done {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.25rem, 3.5vw, 1.75rem);
            font-weight: 600;
            color: #495057;
            padding: 2rem;
            text-align: center;
        }
        .poll-result-row {
            flex-shrink: 0;
            padding: 0.65rem clamp(1rem, 3vw, 1.5rem);
            border-bottom: 1px solid #e9ecef;
            font-size: clamp(0.95rem, 2.8vw, 1.35rem);
        }
        .poll-result-row:last-of-type { border-bottom: none; }
        .poll-result-correct {
            box-shadow: inset 4px 0 0 0 #28a745;
            background: rgba(40, 167, 69, 0.06);
        }
        .poll-result-label {
            display: block;
            font-weight: 600;
            color: #0B1E33;
            margin-bottom: 0.35rem;
        }
        .poll-result-meta {
            font-size: 0.88em;
            color: #6c757d;
        }
        .poll-result-bar-wrap {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            margin-top: 0.45rem;
            overflow: hidden;
        }
        .poll-result-bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.35s ease;
        }
        .poll-result-footer {
            flex-shrink: 0;
            padding: 0.5rem clamp(1rem, 3vw, 1.5rem) 0.75rem;
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            color: #6c757d;
            border-top: 1px solid #dee2e6;
        }
        .session-top {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            font-size: 1.15rem;
            font-weight: 600;
            color: #FFFFFF;
            background-color: #0B1E33;
            border-bottom: none;
        }
        #sessionTime {
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
            min-width: 0;
        }
        .session-top-status {
            display: inline-flex;
            align-items: center;
            flex-shrink: 0;
            gap: 0.15rem;
        }
        .session-battery-charging {
            font-size: 1.15rem;
            line-height: 1;
            color: #FFFFFF;
            flex-shrink: 0;
        }
        /* Custom battery — faculty inactive-symbol grey (#6c757d), compact */
        .session-battery {
            display: inline-flex;
            align-items: center;
            gap: 0;
            flex-shrink: 0;
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1;
        }
        .session-battery-shell {
            position: relative;
            width: clamp(2.5rem, 9vw, 2.85rem);
            height: clamp(1.32rem, 4.2vw, 1.48rem);
            border: 1.5px solid #5a6268;
            border-radius: 4px;
            background: #6c757d;
            overflow: hidden;
            box-sizing: border-box;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }
        .session-battery.session-battery-low .session-battery-shell {
            border-color: #b02a37;
        }
        .session-battery.session-battery-low .session-battery-fill {
            background: #adb5bd;
        }
        .session-battery-fill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 100%;
            max-width: 100%;
            background: #adb5bd;
            transition: width 0.35s ease;
            pointer-events: none;
        }
        .session-battery-pct {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0 3px 0 1px;
            box-sizing: border-box;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            font-size: 1.15rem;
            line-height: 1;
            letter-spacing: -0.03em;
            color: #fff;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.35);
        }
        .session-battery-nub {
            width: 3px;
            height: 0.55rem;
            margin-left: 1px;
            background: #6c757d;
            border: 1.5px solid #5a6268;
            border-left: none;
            border-radius: 0 3px 3px 0;
            box-sizing: border-box;
            flex-shrink: 0;
            align-self: center;
        }
        .session-battery.session-battery-low .session-battery-nub {
            background: #6c757d;
            border-color: #b02a37;
        }
        .session-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            min-height: 0;
            background: #fff;
        }
        .session-center-inner {
            text-align: center;
            max-width: 95%;
        }
        .session-class-name {
            font-size: clamp(2.75rem, 9vw, 5rem);
            font-weight: bold;
            color: #0B1E33;
            margin: 0;
            line-height: 1.15;
        }
        .session-class-code {
            font-size: clamp(1.75rem, 5vw, 3rem);
            color: #0B1E33;
            font-weight: 700;
            margin-top: 1.25rem;
            margin-bottom: 0;
            letter-spacing: 0.02em;
        }
        .session-bottom {
            flex-shrink: 0;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 1.25rem 1.25rem 1.5rem;
            gap: 1rem;
            background: #fff;
            border-top: 2px solid #e5e7eb;
        }
        .session-bottom-left, .session-bottom-right {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.75rem;
        }
        .session-bottom-right {
            margin-left: auto;
        }
        .btn-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-size: 1.35rem;
            transition: transform 0.08s ease, box-shadow 0.08s ease;
            touch-action: manipulation;
        }
        .btn-circle:active { transform: scale(0.92); }
        .btn-circle.hand {
            border: 2px solid #0B1E33;
            background: #fff;
            color: #0B1E33;
        }
        .btn-circle.hand.active { background: #0B1E33; color: #fff; }
        .btn-circle.hand .hand-raised-icon {
            width: 1.35em;
            height: 1.35em;
            display: block;
        }
        .btn-circle.thumb-up {
            border: 2px solid #198754;
            background: #fff;
            color: #198754;
        }
        .btn-circle.thumb-up.active { background: #198754; color: #fff; }
        .btn-circle.thumb-down {
            border: 2px solid #dc3545;
            background: #fff;
            color: #dc3545;
        }
        .btn-circle.thumb-down.active { background: #dc3545; color: #fff; }
        .btn-circle.home-btn {
            background: #0B1E33;
            color: #fff;
            border: none;
        }
        .btn-circle.logout-session {
            background: #dc3545;
            color: #fff;
            border: none;
        }
        .empty-classes { color: rgba(255,255,255,0.85); text-align: center; padding: 2rem; }

        #peerParticipationModal .modal-content { border-radius: 15px; }
        #peerParticipationModal .modal-footer {
            justify-content: center;
            padding-top: 0;
            padding-bottom: 1rem;
            border-top: none;
        }
        #peerParticipationModal .btn-peer-participation-submit {
            padding: 0.45rem 1.15rem !important;
            font-size: 0.875rem !important;
            border-radius: 10px !important;
        }
        .peer-rating-btn {
            min-width: 3rem;
            padding: 0.45rem 0.3rem;
            font-weight: 700;
            border-radius: 10px;
            line-height: 1.15;
        }
        .peer-rating-btn small { display: block; font-size: 0.65rem; font-weight: 600; opacity: 0.85; }
        .peer-rating-btn.active {
            background: var(--comet-blue);
            border-color: var(--comet-blue-dark) !important;
            color: var(--comet-navy);
        }
    </style>
</head>
<body>
<div class="np-root state-sleep" id="npRoot">
    <!-- FRONT SCREEN -->
    <section class="np-screen np-front faculty-bg" id="npFront">
        <div class="sleep-layer" id="sleepFront" aria-label="Wake"></div>
        <div class="front-login-blank panel-hidden" id="frontLoginBlank"></div>
        <div class="front-name-display panel-hidden" id="frontNameWrap">
            <div class="name-text" id="frontStudentName"></div>
        </div>
    </section>
    <!-- BACK SCREEN -->
    <section class="np-screen np-back faculty-bg" id="npBack">
        <div class="sleep-layer" id="sleepBack" aria-label="Wake"></div>
        <div class="session-top panel-hidden" id="backGlobalStatus">
            <span id="sessionTime"></span>
            <div class="session-top-status">
                <span class="session-battery-charging panel-hidden" id="sessionBatteryCharging" aria-hidden="true"><i class="bi bi-lightning-charge-fill"></i></span>
                <span class="session-battery" id="sessionBattery" title="Battery" role="img" aria-label="Battery level">
                    <span class="session-battery-shell">
                        <span class="session-battery-fill" id="sessionBatteryFill"></span>
                        <span class="session-battery-pct" id="sessionBatteryPct">100</span>
                    </span>
                    <span class="session-battery-nub" aria-hidden="true"></span>
                </span>
            </div>
        </div>

        <!-- LOGIN -->
        <div class="back-inner-login panel-hidden" id="backLogin">
            <img src="{{ url_for('static', filename='images/comet_logo.svg') }}" alt="Comet logo" class="login-logo" fetchpriority="high">
            <h1 class="login-welcome">Welcome</h1>
            <div class="card login-card">
                <h2 class="login-card-title">Student Login</h2>
                <form id="studentLoginForm" autocomplete="on">
                    <div class="mb-3">
                        <label for="loginIdentifier" class="form-label">Student Number or Email</label>
                        <input type="text" class="form-control" id="loginIdentifier" name="identifier" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">Password</label>
                        <input type="password" class="form-control" id="loginPassword" name="password" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary-gradient w-100">Login</button>
                </form>
                <div id="loginError" class="alert alert-danger mt-3" style="display: none;"></div>
            </div>
        </div>

        <!-- MY CLASSES -->
        <div class="back-inner-home panel-hidden" id="backHome">
            <div class="dashboard-header">
                <div class="container">
                    <div class="d-flex justify-content-between align-items-center">
                        <h1 class="text-white responsive-title">My Classes</h1>
                        <div class="header-buttons">
                            <button type="button" class="btn-logout-home" id="btnLogoutHome">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="dashboard-content">
                <div class="container">
                    <div class="row" id="classCardsRow"></div>
                    <p class="empty-classes panel-hidden" id="emptyClassesMsg">No active classes available.</p>
                </div>
            </div>
        </div>

        <!-- IN-CLASS SESSION -->
        <div class="back-inner-session panel-hidden" id="backSession">
            <div class="session-main">
                <div class="session-center">
                    <div class="session-center-inner">
                        <h2 class="session-class-name" id="sessionClassName"></h2>

                <div class="session-bottom">
                    <div class="session-bottom-left" id="sessionParticipationControls">
                        <button type="button" class="btn btn-circle hand" id="btnHand" title="Raise hand" aria-label="Raise hand">{% include 'partials/hand_raised_icon.html' %}</button>
                        <button type="button" class="btn btn-circle thumb-up" id="btnThumbUp" title="Thumbs up" aria-label="Thumbs up"><i class="bi bi-hand-thumbs-up"></i></button>

                        <p class="mb-2" id="peerParticipationSubjectLine"></p>
                        <p class="text-muted small mb-3">Choose 0–4. Each level maps to a percentage: 0 = 0%, 1 = 25%, 2 = 50%, 3 = 75%, 4 = 100%.</p>

                            <button type="button" class="btn btn-outline-secondary peer-rating-btn" data-rating="1">1<small>25%</small></button>

<!-- Create Password (first-time) -->
<div class="modal fade" id="createPasswordModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px;">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Create Password</h5>
            </div>
            <div class="modal-body">
                <p class="text-muted">Choose a password for your account (min. 6 characters).</p>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="newPassword" autocomplete="new-password">
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm password</label>
                    <input type="password" class="form-control" id="newPasswordConfirm" autocomplete="new-password">
                </div>
                <div id="createPwError" class="alert alert-danger py-2" style="display: none;"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary-gradient fw-bold" id="btnSubmitPassword">Save</button>
            </div>
        </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
<script>
(function () {
    const root = document.getElementById('npRoot');
    let currentStudent = null;
    let myClasses = [];
    let currentClassId = null;
    let currentClassMeta = null;
    let socket = null;
    let currentPoll = null;
    var peerParticipationPending = null;
    var selectedPeerRating = null;
    var pollResultsDismissTimer = null;
    var POLL_RESULTS_DISPLAY_MS = 7500;

    function clearPollResultsDismissTimer() {
        if (pollResultsDismissTimer) {
            clearTimeout(pollResultsDismissTimer);
            pollResultsDismissTimer = null;
        }
    }

    const NP_STUDENT_TOKEN_KEY = 'np_student_token';

    function getStudentToken() {
        try { return sessionStorage.getItem(NP_STUDENT_TOKEN_KEY) || ''; } catch (e) { return ''; }
    }
    function setStudentToken(t) {
        if (!t) return;
        try { sessionStorage.setItem(NP_STUDENT_TOKEN_KEY, t); } catch (e) {}
    }
    function clearStudentToken() {
        try { sessionStorage.removeItem(NP_STUDENT_TOKEN_KEY); } catch (e) {}
    }

    async function studentFetch(url, options) {
        options = options || {};
        var o = Object.assign({}, options);
        var headers = new Headers(options.headers || {});
        var tok = getStudentToken();
        if (tok) headers.set('Authorization', 'Bearer ' + tok);
        o.headers = headers;
        if (o.credentials === undefined) o.credentials = 'include';
        return fetch(url, o);
    }
    let homeListPollTimer = null;
    /* Same order as faculty dashboard poll chart */
    var POLL_OPTION_BG = ['#28a745', '#dc3545', '#ffc107', '#007bff', '#6c757d'];
    var POLL_OPTION_BTN_FG = ['#ffffff', '#ffffff', '#212529', '#ffffff', '#ffffff'];

    function hideBackPollUI() {
        clearPollResultsDismissTimer();
        var el = document.getElementById('backPollFullscreen');
        if (el) el.classList.add('panel-hidden');
        var opts = document.getElementById('backPollOptions');
        if (opts) { opts.innerHTML = ''; opts.classList.remove('panel-hidden'); }
        var sub = document.getElementById('backPollSubmitted');
        if (sub) { sub.classList.add('panel-hidden'); sub.textContent = ''; }
    }

    /** Brief aggregate results after professor ends the poll (same room as poll_started). */
    function showBriefPollResults(results) {
        clearPollResultsDismissTimer();
        if (!results || !results.options) {
            hideBackPollUI();
            resetDefaultFrontPlate();
            refreshInteractionState();
            return;
        }
        var pq = document.getElementById('backPollQuestion');
        var opts = document.getElementById('backPollOptions');
        var sub = document.getElementById('backPollSubmitted');
        if (!pq || !opts) return;
        sub.classList.add('panel-hidden');
        sub.textContent = '';
        var total = Number(results.total_responses) || 0;
        pq.innerHTML = '';
        var qLine = document.createElement('div');
        qLine.textContent = results.question || 'Poll';
        pq.appendChild(qLine);
        var subLine = document.createElement('div');
        subLine.style.fontSize = 'clamp(0.85rem, 2.5vw, 1.05rem)';
        subLine.style.fontWeight = '600';
        subLine.style.color = '#6c757d';
        subLine.style.marginTop = '0.35rem';
        subLine.textContent = 'Results · ' + total + ' response' + (total === 1 ? '' : 's');
        pq.appendChild(subLine);

        opts.innerHTML = '';
        opts.classList.remove('panel-hidden');
        var counts = results.counts || [];
        var options = results.options || [];
        var graded = results.is_graded && results.correct_answer !== null && results.correct_answer !== undefined && results.correct_answer !== '';
        var ca = graded ? Number(results.correct_answer) : NaN;
        options.forEach(function (opt, i) {
            var c = counts[i] != null ? Number(counts[i]) : 0;
            var pct = total > 0 ? Math.round((c / total) * 100) : 0;
            var row = document.createElement('div');
            row.className = 'poll-result-row';
            if (graded && !isNaN(ca) && ca === i) row.classList.add('poll-result-correct');
            var label = document.createElement('span');
            label.className = 'poll-result-label';
            label.textContent = String(opt);
            var meta = document.createElement('span');
            meta.className = 'poll-result-meta';
            meta.textContent = c + ' (' + pct + '%)' + (graded && !isNaN(ca) && ca === i ? ' — Correct' : '');
            var barWrap = document.createElement('div');
            barWrap.className = 'poll-result-bar-wrap';
            var bar = document.createElement('div');
            bar.className = 'poll-result-bar';
            bar.style.width = pct + '%';
            bar.style.background = POLL_OPTION_BG[i] || '#6c757d';
            barWrap.appendChild(bar);
            row.appendChild(label);
            row.appendChild(meta);
            row.appendChild(barWrap);
            opts.appendChild(row);
        });
        var foot = document.createElement('div');
        foot.className = 'poll-result-footer';
        foot.textContent = 'Closing automatically…';
        opts.appendChild(foot);

        document.getElementById('backPollFullscreen').classList.remove('panel-hidden');
        resetDefaultFrontPlate();
        clearPollResultsDismissTimer();
        pollResultsDismissTimer = setTimeout(function () {
            pollResultsDismissTimer = null;
            hideBackPollUI();
            resetDefaultFrontPlate();
            refreshInteractionState();
        }, POLL_RESULTS_DISPLAY_MS);
    }

    function resetDefaultFrontPlate() {
        var fr = document.getElementById('npFront');
        var nameWrap = document.getElementById('frontNameWrap');
        var nameEl = document.getElementById('frontStudentName');
        if (fr) {
            fr.style.removeProperty('background');
            fr.style.removeProperty('background-color');
        }
        if (nameWrap) {
            nameWrap.style.removeProperty('background');
            nameWrap.style.removeProperty('background-color');
        }
        if (nameEl) {
            nameEl.style.removeProperty('color');
            nameEl.style.removeProperty('transform');
            nameEl.style.removeProperty('transform-origin');
        }
        var pollFs = document.getElementById('backPollFullscreen');
        if (pollFs) {
            pollFs.style.removeProperty('background');
            pollFs.style.removeProperty('background-color');
        }
        var pq = document.getElementById('backPollQuestion');
        var pd = document.getElementById('backPollSubmitted');
        if (pq) {
            pq.style.removeProperty('color');
            pq.style.removeProperty('border-bottom-color');
        }
        if (pd) pd.style.removeProperty('color');
        scheduleFitFrontName();
    }

    /** Name + poll text always this colour (matches default nameplate) */
    var STUDENT_DISPLAY_TEXT = '#212529';

    /** Non-anonymous: background = faculty bar colour for correct option (if quiz has key), else selected option */
    function applyNonAnonymousAnswerColors(answerIndex) {
        var i = Math.max(0, Math.min(answerIndex, POLL_OPTION_BG.length - 1));
        var bg = POLL_OPTION_BG[i] || '#6c757d';
        var fr = document.getElementById('npFront');
        var nameWrap = document.getElementById('frontNameWrap');
        var nameEl = document.getElementById('frontStudentName');
        if (fr) fr.style.setProperty('background', bg, 'important');
        if (nameWrap) nameWrap.style.setProperty('background', bg, 'important');
        if (nameEl) nameEl.style.setProperty('color', STUDENT_DISPLAY_TEXT, 'important');
        var pollFs = document.getElementById('backPollFullscreen');
        if (pollFs) pollFs.style.setProperty('background', bg, 'important');
        var pq = document.getElementById('backPollQuestion');
        if (pq) {
            pq.style.setProperty('color', STUDENT_DISPLAY_TEXT, 'important');
            pq.style.setProperty('border-bottom-color', 'rgba(0,0,0,0.12)', 'important');
        }
        var pd = document.getElementById('backPollSubmitted');
        if (pd) pd.style.setProperty('color', STUDENT_DISPLAY_TEXT, 'important');
        scheduleFitFrontName();
    }

    function pollIsAnonymous(p) {
        return p && (p.is_anonymous === true || p.is_anonymous === 1 || p.is_anonymous === '1' || String(p.is_anonymous).toLowerCase() === 'true');
    }

    var HAND_RAISE_FRONT_BG = '#ff9800';

    function applyHandRaiseFrontTint() {
        var fr = document.getElementById('npFront');
        var nameWrap = document.getElementById('frontNameWrap');
        var nameEl = document.getElementById('frontStudentName');
        if (fr) fr.style.setProperty('background', HAND_RAISE_FRONT_BG, 'important');
        if (nameWrap) nameWrap.style.setProperty('background', HAND_RAISE_FRONT_BG, 'important');
        if (nameEl) nameEl.style.setProperty('color', STUDENT_DISPLAY_TEXT, 'important');
        scheduleFitFrontName();
    }

    /** Front only — white nameplate (used when hand lowered or prof clears hands) */
    function clearFrontNameplateInline() {
        var fr = document.getElementById('npFront');
        var nameWrap = document.getElementById('frontNameWrap');
        var nameEl = document.getElementById('frontStudentName');
        if (fr) {
            fr.style.removeProperty('background');
            fr.style.removeProperty('background-color');
        }
        if (nameWrap) {
            nameWrap.style.removeProperty('background');
            nameWrap.style.removeProperty('background-color');
        }
        if (nameEl) {
            nameEl.style.removeProperty('color');
            nameEl.style.removeProperty('transform');
            nameEl.style.removeProperty('transform-origin');
        }
        scheduleFitFrontName();
    }

    function showBackPollFullscreen(data) {
        document.getElementById('backPollQuestion').textContent = data.question || 'Poll';
        var optsEl = document.getElementById('backPollOptions');
        var sub = document.getElementById('backPollSubmitted');
        sub.classList.add('panel-hidden');
        sub.textContent = '';
        optsEl.classList.remove('panel-hidden');
        optsEl.innerHTML = '';
        (data.options || []).forEach(function (opt, i) {
            var b = document.createElement('button');
            b.type = 'button';
            b.className = 'poll-opt-btn';
            b.style.backgroundColor = POLL_OPTION_BG[i] || '#6c757d';
            b.style.color = POLL_OPTION_BTN_FG[i] || '#ffffff';
            b.textContent = opt;
            b.addEventListener('click', function () { submitPoll(i); });
            optsEl.appendChild(b);
        });
        document.getElementById('backPollFullscreen').classList.remove('panel-hidden');
    }

    function setState(name) {
        root.className = 'np-root state-' + name;
    }

    function isHomeState() {
        return root.className.indexOf('state-home') >= 0;
    }

    function stopStudentLiveUpdates() {
        if (homeListPollTimer) {
            clearInterval(homeListPollTimer);
            homeListPollTimer = null;
        }
    }

    function startStudentLiveUpdates() {
        stopStudentLiveUpdates();
        homeListPollTimer = setInterval(async function () {
            if (!isHomeState() || !currentStudent) return;
            const next = await loadClasses();
            if (!isHomeState()) return;
            myClasses = next;
            renderClassCards();
            requestJoinStudentEnrollments();
        }, 5000);
    }

    function requestJoinStudentEnrollments() {
        if (socket && socket.connected) {
            var tok = getStudentToken();
            try { socket.emit('join_student_enrollments', tok ? { token: tok } : {}); } catch (e) {}
        }
    }

    function syncBackStatusBarVisibility() {
        var login = document.getElementById('backLogin');
        var home = document.getElementById('backHome');
        var sess = document.getElementById('backSession');
        var bar = document.getElementById('backGlobalStatus');
        if (!bar || !login || !home || !sess) return;
        var show = !login.classList.contains('panel-hidden') || !home.classList.contains('panel-hidden') || !sess.classList.contains('panel-hidden');
        bar.classList.toggle('panel-hidden', !show);
    }

    function wake() {
        disconnectSocket();
        setState('login');
        document.getElementById('frontLoginBlank').classList.remove('panel-hidden');
        document.getElementById('backLogin').classList.remove('panel-hidden');
        document.getElementById('frontNameWrap').classList.add('panel-hidden');
        document.getElementById('backHome').classList.add('panel-hidden');
        document.getElementById('backSession').classList.add('panel-hidden');
        syncBackStatusBarVisibility();
    }

    document.getElementById('sleepFront').addEventListener('pointerdown', wake);
    document.getElementById('sleepBack').addEventListener('pointerdown', wake);

    function displayName(showFirstOnly) {
        if (!currentStudent) return '';
        const first = (currentStudent.preferred_name || currentStudent.first_name || '').trim();
        const last = (currentStudent.last_name || '').trim();
        if (!showFirstOnly) {
            return (first + ' ' + last).trim();
        }
        var fromMeta = null;
        if (currentClassMeta && currentClassMeta.first_name_only_display) {
            fromMeta = String(currentClassMeta.first_name_only_display).trim();
        }
        if (!fromMeta && myClasses && currentClassId != null) {
            var row = myClasses.find(function (x) { return Number(x.id) === Number(currentClassId); });
            if (row && row.first_name_only_display) {
                fromMeta = String(row.first_name_only_display).trim();
            }
        }
        if (fromMeta) {
            return fromMeta;
        }
        return first;
    }

    function fitFrontNameToScreen() {
        const wrap = document.getElementById('frontNameWrap');
        const el = document.getElementById('frontStudentName');
        if (!wrap || !el || wrap.classList.contains('panel-hidden') || !el.textContent.trim()) return;
        el.style.transform = '';
        el.style.transformOrigin = '';
        const cs = window.getComputedStyle(wrap);
        const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
        const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
        const maxW = Math.max(32, wrap.clientWidth - padX);
        const maxH = Math.max(32, wrap.clientHeight - padY);
        el.style.width = '100%';
        el.style.maxWidth = maxW + 'px';
        el.style.lineHeight = '1.05';
        el.style.whiteSpace = 'nowrap'; // Always single line
        let lo = 12;
        let hi = Math.min(maxH * 0.9, 900); // Cap by height — single line only
        let best = lo;
        for (let i = 0; i < 40; i++) {
            if (hi - lo < 0.35) break;
            const mid = (lo + hi) / 2;
            el.style.fontSize = mid + 'px';
            // Only check width — height check removed to prevent multi-line fallback
            if (el.scrollWidth <= maxW + 1) {
                best = mid;
                lo = mid;
            } else {
                hi = mid;
            }
        }
        el.style.fontSize = best + 'px';
        if (el.scrollWidth > maxW + 1) {
            const s = maxW / el.scrollWidth;
            el.style.transformOrigin = 'center center';
            el.style.transform = 'scale(' + s + ')';
        }
    }

    function scheduleFitFrontName() {
        requestAnimationFrame(function () {
            requestAnimationFrame(fitFrontNameToScreen);
        });
    }

    function updateFrontName() {
        const el = document.getElementById('frontStudentName');
        if (!currentStudent) {
            el.textContent = '';
            el.style.fontSize = '';
            el.style.transform = '';
            el.style.transformOrigin = '';
            return;
        }
        if (currentClassMeta && typeof currentClassMeta.show_first_name_only === 'boolean') {
            el.textContent = displayName(currentClassMeta.show_first_name_only);
        } else {
            const allFirst = myClasses.length && myClasses.every(c => c.show_first_name_only);
            if (allFirst) {
                const displays = myClasses.map(c => (c.first_name_only_display || '').trim()).filter(Boolean);
                if (displays.length === myClasses.length) {
                    const uniq = [...new Set(displays)];
                    el.textContent = uniq.length === 1 ? displays[0] : displays.reduce((a, b) => (a.length >= b.length ? a : b));
                } else {
                    el.textContent = displayName(true);
                }
            } else {
                el.textContent = displayName(false);
            }
        }
        scheduleFitFrontName();
    }

    window.addEventListener('resize', function () {
        if (!document.getElementById('frontNameWrap').classList.contains('panel-hidden')) {
            scheduleFitFrontName();
        }
    });

    document.getElementById('studentLoginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const err = document.getElementById('loginError');
        err.style.display = 'none';
        const identifier = document.getElementById('loginIdentifier').value.trim();
        const password = document.getElementById('loginPassword').value;
        try {
            const res = await fetch('/api/student/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ identifier, password })
            });
            const data = await res.json();
            if (data.success && data.needs_password) {
                if (data.token) setStudentToken(data.token);
                currentStudent = data.student;
                document.getElementById('loginPassword').value = '';
                new bootstrap.Modal(document.getElementById('createPasswordModal')).show();
                return;
            }
            if (data.success && data.student) {
                if (data.token) setStudentToken(data.token);
                currentStudent = data.student;
                await enterHome();
                return;
            }
            err.textContent = data.error || 'Login failed';
            err.style.display = 'block';
        } catch (x) {
            err.textContent = 'Connection error. Try again.';
            err.style.display = 'block';
        }
    });

    document.getElementById('btnSubmitPassword').addEventListener('click', async function () {
        const pw = document.getElementById('newPassword').value;
        const pw2 = document.getElementById('newPasswordConfirm').value;
        const errEl = document.getElementById('createPwError');
        errEl.style.display = 'none';
        if (pw.length < 6) {
            errEl.textContent = 'Password must be at least 6 characters.';
            errEl.style.display = 'block';
            return;
        }
        if (pw !== pw2) {
            errEl.textContent = 'Passwords do not match.';
            errEl.style.display = 'block';
            return;
        }
        const res = await studentFetch('/api/student/set_password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pw, confirm_password: pw2 })
        });
        const data = await res.json();
        if (data.success && data.student) {
            if (data.token) setStudentToken(data.token);
            bootstrap.Modal.getInstance(document.getElementById('createPasswordModal')).hide();
            currentStudent = Object.assign({}, currentStudent, data.student);
            document.getElementById('newPassword').value = '';
            document.getElementById('newPasswordConfirm').value = '';
            await enterHome();
        } else {
            errEl.textContent = data.error || 'Failed to save password';
            errEl.style.display = 'block';
        }
    });

    async function loadClasses() {
        const res = await studentFetch('/api/student/classes', {});
        if (res.status === 401) {
            clearStudentToken();
            wake();
            document.getElementById('loginError').textContent = 'Session expired. Please log in again.';
            document.getElementById('loginError').style.display = 'block';
            return [];
        }
        const data = await res.json();
        if (data.success === false) return [];
        return Array.isArray(data) ? data : [];
    }

    /** Reload class flags + first_name_only_display after roster/settings change. */
    function refreshStudentClassListMeta() {
        return loadClasses().then(function (next) {
            if (!next || !next.length) return;
            myClasses = next;
            if (currentClassId != null && currentClassMeta) {
                var row = myClasses.find(function (x) { return Number(x.id) === Number(currentClassId); });
                if (row) {
                    Object.assign(currentClassMeta, row);
                }
            }
        });
    }

    /** Update live/idle flag from Socket.IO (no HTTP) for instant UI like in-class reactions. */
    function patchMyClassActive(classId, isActive) {
        if (!myClasses || !myClasses.length) return false;
        const id = Number(classId);
        for (var i = 0; i < myClasses.length; i++) {
            if (Number(myClasses[i].id) === id) {
                myClasses[i].is_active = isActive;
                return true;
            }
        }
        return false;
    }

    function renderClassCards() {
        const row = document.getElementById('classCardsRow');
        const empty = document.getElementById('emptyClassesMsg');
        row.innerHTML = '';
        if (!myClasses.length) {
            empty.classList.remove('panel-hidden');
            return;
        }
        empty.classList.add('panel-hidden');
        myClasses.forEach(c => {
            const col = document.createElement('div');
            col.className = 'col-md-4';
            const live = !!c.is_active;
            const badge = live
                ? '<span class="badge bg-success status-badge">Active</span>'
                : '<span class="badge bg-secondary status-badge">Inactive</span>';
            const cardCls = 'card class-card' + (live ? '' : ' class-card-inactive');
            col.innerHTML = `
                <div class="${cardCls}" data-class-id="${c.id}">
                    <div class="card-body">
                        <div style="flex:1;"><h5 class="card-title">${escapeHtml(c.name)}</h5></div>
                        <div style="margin-top:auto;">
                            <p class="class-code text-muted" style="margin-bottom:0.5rem;">${escapeHtml(c.class_code)}</p>
                            ${badge}
                        </div>
                    </div>
                </div>`;
            col.querySelector('.class-card').addEventListener('click', () => joinClassSession(c));
            row.appendChild(col);
        });
    }

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    async function enterHome() {
        myClasses = await loadClasses();
        setState('home');
        document.getElementById('frontLoginBlank').classList.add('panel-hidden');
        document.getElementById('backLogin').classList.add('panel-hidden');
        document.getElementById('frontNameWrap').classList.remove('panel-hidden');
        document.getElementById('backHome').classList.remove('panel-hidden');
        document.getElementById('backSession').classList.add('panel-hidden');
        currentClassId = null;
        currentClassMeta = null;
        updateFrontName();
        renderClassCards();
        await ensureStudentSocketReady();
        requestJoinStudentEnrollments();
        startStudentLiveUpdates();
        syncBackStatusBarVisibility();
    }

    async function joinClassSession(c) {
        const res = await studentFetch('/api/student/join_class', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ class_id: c.id })
        });
        const data = await res.json();
        if (!data.success) {
            alert(data.error || 'Could not join class');
            return;
        }
        currentClassId = c.id;
        currentClassMeta = { ...c };
        if (typeof data.show_first_name_only === 'boolean') {
            currentClassMeta.show_first_name_only = data.show_first_name_only;
        }
        if (data.first_name_only_display != null && data.first_name_only_display !== '') {
            currentClassMeta.first_name_only_display = data.first_name_only_display;
        }
        stopStudentLiveUpdates();
        await ensureStudentSocketReady();
        socket.emit('join_class', { class_id: c.id });
        setState('session');
        document.getElementById('backHome').classList.add('panel-hidden');
        document.getElementById('backSession').classList.remove('panel-hidden');
        document.getElementById('sessionClassName').textContent = c.name;
        document.getElementById('sessionClassCode').textContent = c.class_code;
        applyQuietParticipationUI();
        updateFrontName();
        refreshInteractionState();
        syncBackStatusBarVisibility();
    }

    function applyQuietParticipationUI() {
        var row = document.getElementById('sessionParticipationControls');
        if (!row) return;
        if (currentClassMeta && currentClassMeta.quiet_mode) {
            row.classList.add('panel-hidden');
        } else {
            row.classList.remove('panel-hidden');
        }
    }

    function initStudentSocketIfNeeded() {
        if (socket) {
            if (socket.connected) requestJoinStudentEnrollments();
            return;
        }
        // WebSocket only — avoids Engine.IO long-polling delivery delays (can be 10s+ between polls).
        socket = io({
            transports: ['websocket'],
            reconnection: true,
            reconnectionDelay: 500,
            reconnectionDelayMax: 4000,
            timeout: 15000
        });
        socket.on('connect', function () {
            requestJoinStudentEnrollments();
        });
        socket.on('settings_updated', function (d) {
            if (!d || d.class_id == null || d.class_id === undefined) return;
            var cid = Number(d.class_id);
            for (var i = 0; i < myClasses.length; i++) {
                if (Number(myClasses[i].id) === cid) {
                    if (typeof d.show_first_name_only === 'boolean') {
                        myClasses[i].show_first_name_only = d.show_first_name_only;
                    }
                    if (typeof d.quiet_mode === 'boolean') {
                        myClasses[i].quiet_mode = d.quiet_mode;
                    }
                    break;
                }
            }
            if (currentClassId != null && Number(currentClassId) === cid && currentClassMeta) {
                if (typeof d.show_first_name_only === 'boolean') {
                    currentClassMeta.show_first_name_only = d.show_first_name_only;
                }
                if (typeof d.quiet_mode === 'boolean') {
                    currentClassMeta.quiet_mode = d.quiet_mode;
                }
                applyQuietParticipationUI();
            }
            if (currentStudent) {
                refreshStudentClassListMeta().then(function () {
                    updateFrontName();
                });
            }
        });
        socket.on('poll_started', function (data) {
            if (!data || !currentClassId) return;
            currentPoll = data;
            resetDefaultFrontPlate();
            showBackPollFullscreen(data);
        });
        socket.on('poll_stopped', function (data) {
            clearPollResultsDismissTimer();
            currentPoll = null;
            if (
                data &&
                data.results &&
                currentClassId != null &&
                data.class_id != null &&
                String(data.class_id) === String(currentClassId)
            ) {
                showBriefPollResults(data.results);
                return;
            }
            hideBackPollUI();
            resetDefaultFrontPlate();
            refreshInteractionState();
        });
        socket.on('poll_responses_cleared', function (d) {
            if (!d || d.poll_id == null || !currentClassId || !currentPoll) return;
            if (Number(d.poll_id) !== Number(currentPoll.poll_id)) return;
            resetDefaultFrontPlate();
            showBackPollFullscreen(currentPoll);
            refreshInteractionState();
        });
        socket.on('all_hands_cleared', function (d) {
            if (!currentClassId || !d || String(d.class_id) !== String(currentClassId)) return;
            var handBtn = document.getElementById('btnHand');
            if (handBtn && handBtn.classList.contains('active')) {
                handBtn.classList.remove('active');
                clearFrontNameplateInline();
            }
        });
        socket.on('hand_raise_dismissed', function (d) {
            if (!currentClassId || !d || String(d.class_id) !== String(currentClassId)) return;
            if (!currentStudent || Number(d.student_id) !== Number(currentStudent.id)) return;
            var handBtn = document.getElementById('btnHand');
            if (handBtn && handBtn.classList.contains('active')) {
                handBtn.classList.remove('active');
                clearFrontNameplateInline();
            }
        });
        socket.on('thumbs_reactions_cleared', function (d) {
            if (!currentClassId || !d || String(d.class_id) !== String(currentClassId)) return;
            clearThumbAutoOffTimer();
            refreshInteractionState();
        });

        socket.on('peer_participation_grade_request', function (d) {
            if (!d || currentClassId == null || Number(d.class_id) !== Number(currentClassId)) return;
            if (!currentStudent) return;
            if (Number(d.subject_student_id) === Number(currentStudent.id)) return;
            openPeerParticipationModal(d);
        });

        socket.on('class_started', function (d) {
            if (!isHomeState() || !d || d.class_id == null) return;
            if (!patchMyClassActive(d.class_id, true)) {
                loadClasses().then(function (next) {
                    if (!isHomeState()) return;
                    myClasses = next;
                    renderClassCards();
                });
            } else {
                renderClassCards();
            }
            requestJoinStudentEnrollments();
        });

        // Professor ended class (in session) or live status changed (My Classes)
        socket.on('class_stopped', function (d) {
            if (currentClassId && d && String(d.class_id) === String(currentClassId)) {
                clearPollResultsDismissTimer();
                flushThumbsBeforeLeave();
                patchMyClassActive(d.class_id, false);
                currentClassId = null;
                currentClassMeta = null;
                currentPoll = null;
                hideBackPollUI();
                resetDefaultFrontPlate();
                setState('home');
                document.getElementById('backSession').classList.add('panel-hidden');
                document.getElementById('backHome').classList.remove('panel-hidden');
                updateFrontName();
                renderClassCards();
                requestJoinStudentEnrollments();
                startStudentLiveUpdates();
                loadClasses().then(function (next) {
                    if (!isHomeState()) return;
                    myClasses = next;
                    renderClassCards();
                });
                syncBackStatusBarVisibility();
                return;
            }
            if (!isHomeState() || !d || d.class_id == null) return;
            if (!patchMyClassActive(d.class_id, false)) {
                loadClasses().then(function (next) {
                    if (!isHomeState()) return;
                    myClasses = next;
                    renderClassCards();
                });
            } else {
                renderClassCards();
            }
            requestJoinStudentEnrollments();
        });
    }

    function ensureStudentSocketReady() {
        return new Promise(function (resolve) {
            initStudentSocketIfNeeded();
            if (socket.connected) {
                requestJoinStudentEnrollments();
                resolve();
                return;
            }
            socket.once('connect', function () {
                requestJoinStudentEnrollments();
                resolve();
            });
        });
    }

    function disconnectSocket() {
        stopStudentLiveUpdates();
        if (socket) {
            try { socket.disconnect(); } catch (e) {}
            socket = null;
        }
    }

    async function submitPoll(answerIndex) {
        if (!currentPoll || !currentClassId) return;
        var pollSnapshot = currentPoll;
        var res = await studentFetch('/api/student/poll_response', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ poll_id: pollSnapshot.poll_id, answer: answerIndex })
        });
        var data = await res.json();
        if (data.success) {
            document.querySelectorAll('#backPollOptions .poll-opt-btn').forEach(function (b) { b.disabled = true; });
            document.getElementById('backPollOptions').classList.add('panel-hidden');
            var sub = document.getElementById('backPollSubmitted');
            sub.textContent = 'Response recorded.';
            sub.classList.remove('panel-hidden');
            if (pollIsAnonymous(pollSnapshot)) {
                resetDefaultFrontPlate();
            } else {
                // Colour matches the option the student selected (same index as poll buttons / faculty chart)
                applyNonAnonymousAnswerColors(answerIndex);
            }
        } else {
            var err = (data.error || '').toLowerCase();
            if (err.indexOf('already') !== -1) {
                document.querySelectorAll('#backPollOptions .poll-opt-btn').forEach(function (b) { b.disabled = true; });
                document.getElementById('backPollOptions').classList.add('panel-hidden');
                document.getElementById('backPollSubmitted').textContent = 'You already responded.';
                document.getElementById('backPollSubmitted').classList.remove('panel-hidden');
                resetDefaultFrontPlate();
            } else {
                alert(data.error || 'Could not submit');
            }
        }
    }

    var thumbAutoOffTimer = null;
    var THUMB_ACTIVE_MS = 10000;

    function clearThumbAutoOffTimer() {
        if (thumbAutoOffTimer) {
            clearTimeout(thumbAutoOffTimer);
            thumbAutoOffTimer = null;
        }
    }

    function applyThumbsUI(thumbsUpActive, thumbsDownActive) {
        document.getElementById('btnThumbUp').classList.toggle('active', !!thumbsUpActive);
        document.getElementById('btnThumbDown').classList.toggle('active', !!thumbsDownActive);
    }

    function scheduleThumbAutoOff(type) {
        clearThumbAutoOffTimer();
        thumbAutoOffTimer = setTimeout(function () {
            thumbAutoOffTimer = null;
            sendThumbsAutoOff(type);
        }, THUMB_ACTIVE_MS);
    }

    async function sendThumbsAutoOff(type) {
        if (!currentClassId || (type !== 'thumbs_up' && type !== 'thumbs_down')) return;
        try {
            const res = await studentFetch('/api/student/interaction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ class_id: currentClassId, type: type, action: 'auto_off' })
            });
            const data = await res.json();
            if (data.success && typeof data.thumbs_up_active === 'boolean') {
                applyThumbsUI(data.thumbs_up_active, data.thumbs_down_active);
            }
        } catch (e) {}
    }

    async function refreshInteractionState() {
        if (!currentClassId) return;
        try {
            const res = await studentFetch('/api/student/interaction_state/' + currentClassId, {});
            const d = await res.json();
            if (d.success) {
                document.getElementById('btnHand').classList.toggle('active', d.hand_raise_active);
                applyThumbsUI(d.thumbs_up_active, d.thumbs_down_active);
                clearThumbAutoOffTimer();
                if (d.thumbs_up_active) {
                    scheduleThumbAutoOff('thumbs_up');
                } else if (d.thumbs_down_active) {
                    scheduleThumbAutoOff('thumbs_down');
                }
                if (d.hand_raise_active) {
                    applyHandRaiseFrontTint();
                }
            }
        } catch (e) {}
    }

    async function sendInteraction(type) {
        if (!currentClassId) return;
        if (currentClassMeta && currentClassMeta.quiet_mode) return;
        if (type === 'thumbs_up' || type === 'thumbs_down') {
            clearThumbAutoOffTimer();
        }
        const res = await studentFetch('/api/student/interaction', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ class_id: currentClassId, type })
        });
        const data = await res.json();
        if (data.success) {
            if (type === 'hand_raise') {
                document.getElementById('btnHand').classList.toggle('active', data.is_active);
                if (data.is_active) {
                    applyHandRaiseFrontTint();
                } else {
                    clearFrontNameplateInline();
                }
            }
            if (type === 'thumbs_up' || type === 'thumbs_down') {
                if (typeof data.thumbs_up_active === 'boolean') {
                    applyThumbsUI(data.thumbs_up_active, data.thumbs_down_active);
                    if (data.thumbs_up_active) {
                        scheduleThumbAutoOff('thumbs_up');
                    } else if (data.thumbs_down_active) {
                        scheduleThumbAutoOff('thumbs_down');
                    }
                }
            }
        } else {
            alert(data.error || 'Action failed');
        }
    }

    document.getElementById('btnHand').addEventListener('click', () => sendInteraction('hand_raise'));
    document.getElementById('btnThumbUp').addEventListener('click', () => sendInteraction('thumbs_up'));
    document.getElementById('btnThumbDown').addEventListener('click', () => sendInteraction('thumbs_down'));

    function flushThumbsBeforeLeave() {
        clearThumbAutoOffTimer();
        if (!currentClassId) return;
        var up = document.getElementById('btnThumbUp').classList.contains('active');
        var dn = document.getElementById('btnThumbDown').classList.contains('active');
        if (up) sendThumbsAutoOff('thumbs_up');
        if (dn) sendThumbsAutoOff('thumbs_down');
    }

    document.getElementById('btnSessionHome').addEventListener('click', async function () {
        flushThumbsBeforeLeave();
        if (currentClassId) {
            await studentFetch('/api/student/leave_class', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ class_id: currentClassId })
            });
            if (socket) socket.emit('leave_class', { class_id: currentClassId });
        }
        currentClassId = null;
        currentClassMeta = null;
        currentPoll = null;
        hideBackPollUI();
        resetDefaultFrontPlate();
        myClasses = await loadClasses();
        setState('home');
        document.getElementById('backSession').classList.add('panel-hidden');
        document.getElementById('backHome').classList.remove('panel-hidden');
        updateFrontName();
        renderClassCards();
        await ensureStudentSocketReady();
        requestJoinStudentEnrollments();
        startStudentLiveUpdates();
        syncBackStatusBarVisibility();
    });

    async function doLogout(withClass) {
        flushThumbsBeforeLeave();
        try {
            await studentFetch('/api/student/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(withClass && currentClassId ? { class_id: currentClassId } : {})
            });
        } finally {
            clearStudentToken();
        }
        if (socket && currentClassId) try { socket.emit('leave_class', { class_id: currentClassId }); } catch (e) {}
        disconnectSocket();
        hideBackPollUI();
        resetDefaultFrontPlate();
        var pmEl = document.getElementById('peerParticipationModal');
        if (pmEl) {
            var pmi = bootstrap.Modal.getInstance(pmEl);
            if (pmi) pmi.hide();
        }
        hidePeerParticipationBackdrop();
        currentStudent = null;
        currentClassId = null;
        currentClassMeta = null;
        myClasses = [];
        currentPoll = null;
        document.getElementById('loginIdentifier').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('frontNameWrap').classList.add('panel-hidden');
        document.getElementById('backHome').classList.add('panel-hidden');
        document.getElementById('backSession').classList.add('panel-hidden');
        document.getElementById('frontLoginBlank').classList.add('panel-hidden');
        document.getElementById('backLogin').classList.add('panel-hidden');
        setState('sleep');
        syncBackStatusBarVisibility();
    }

    document.getElementById('btnLogoutHome').addEventListener('click', () => doLogout(false));
    document.getElementById('btnSessionLogout').addEventListener('click', () => doLogout(true));

    function showPeerParticipationBackdrop() {
        var dim = document.getElementById('peerParticipationDim');
        if (dim) {
            dim.classList.remove('panel-hidden');
            dim.setAttribute('aria-hidden', 'false');
        }
    }
    function hidePeerParticipationBackdrop() {
        var dim = document.getElementById('peerParticipationDim');
        if (dim) {
            dim.classList.add('panel-hidden');
            dim.setAttribute('aria-hidden', 'true');
        }
    }

    function openPeerParticipationModal(d) {
        peerParticipationPending = { round_id: d.round_id, class_id: d.class_id };
        selectedPeerRating = null;
        var line = document.getElementById('peerParticipationSubjectLine');
        if (line) {
            line.textContent = 'How would you rate ' + (d.subject_display_name || 'this classmate') + "'s participation?";
        }
        var err = document.getElementById('peerParticipationError');
        if (err) { err.style.display = 'none'; err.textContent = ''; }
        document.querySelectorAll('#peerParticipationScale .peer-rating-btn').forEach(function (b) { b.classList.remove('active'); });
        var sub = document.getElementById('btnPeerParticipationSubmit');
        if (sub) sub.disabled = true;
        var el = document.getElementById('peerParticipationModal');
        if (el) {
            showPeerParticipationBackdrop();
            /* Backdrop stays on student-facing #npBack only (not full dual-monitor viewport). */
            bootstrap.Modal.getOrCreateInstance(el, { backdrop: false, keyboard: true }).show();
        }
    }

    async function submitPeerParticipationRating() {
        var err = document.getElementById('peerParticipationError');
        if (err) { err.style.display = 'none'; }
        if (!peerParticipationPending || selectedPeerRating === null) return;
        try {
            var res = await studentFetch('/api/student/peer_participation_grade', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    class_id: peerParticipationPending.class_id,
                    round_id: peerParticipationPending.round_id,
                    rating: selectedPeerRating
                })
            });
            var data = await res.json();
            if (!data.success) {
                if (err) {
                    err.textContent = data.error || 'Could not submit';
                    err.style.display = 'block';
                }
                return;
            }
            peerParticipationPending = null;
            selectedPeerRating = null;
            var modalEl = document.getElementById('peerParticipationModal');
            var inst = modalEl ? bootstrap.Modal.getInstance(modalEl) : null;
            if (inst) inst.hide();
        } catch (x) {
            if (err) {
                err.textContent = 'Connection error. Try again.';
                err.style.display = 'block';
            }
        }
    }

    function setupPeerParticipationModal() {
        var pm = document.getElementById('peerParticipationModal');
        if (pm) {
            pm.addEventListener('hidden.bs.modal', function () {
                hidePeerParticipationBackdrop();
            });
        }
        var scale = document.getElementById('peerParticipationScale');
        if (!scale) return;
        scale.addEventListener('click', function (e) {
            var t = e.target.closest('.peer-rating-btn');
            if (!t) return;
            var r = parseInt(t.getAttribute('data-rating'), 10);
            if (isNaN(r)) return;
            selectedPeerRating = r;
            scale.querySelectorAll('.peer-rating-btn').forEach(function (b) { b.classList.toggle('active', b === t); });
            var sub = document.getElementById('btnPeerParticipationSubmit');
            if (sub) sub.disabled = false;
        });
        var subBtn = document.getElementById('btnPeerParticipationSubmit');
        if (subBtn) subBtn.addEventListener('click', function () { submitPeerParticipationRating(); });
    }
    setupPeerParticipationModal();

    function tickClock() {
        const now = new Date();
        const t = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'America/New_York' });
        const el = document.getElementById('sessionTime');
        if (el) el.textContent = t;
    }
    setInterval(tickClock, 1000);
    tickClock();

    function updateSessionBatteryUI(level, charging) {
        var wrap = document.getElementById('sessionBattery');
        var pctEl = document.getElementById('sessionBatteryPct');
        var fillEl = document.getElementById('sessionBatteryFill');
        var bolt = document.getElementById('sessionBatteryCharging');
        if (!pctEl) return;
        var p = Math.round((level != null ? level : 1) * 100);
        p = Math.max(0, Math.min(100, p));
        pctEl.textContent = String(p);
        if (fillEl) fillEl.style.width = p + '%';
        if (bolt) {
            bolt.classList.toggle('panel-hidden', !charging);
            bolt.setAttribute('aria-hidden', charging ? 'false' : 'true');
        }
        if (wrap) {
            wrap.classList.toggle('session-battery-low', p <= 15 && !charging);
            wrap.title = charging ? 'Charging · ' + p : 'Battery · ' + p;
            wrap.setAttribute('aria-label', 'Battery ' + p + (charging ? ', charging' : ''));
        }
    }
    if (navigator.getBattery) {
        navigator.getBattery().then(function (b) {
            function upd() { updateSessionBatteryUI(b.level, b.charging); }
            b.addEventListener('levelchange', upd);
            b.addEventListener('chargingchange', upd);
            upd();
        });
    } else {
        updateSessionBatteryUI(1, false);
    }

    (async function initSession() {
        try {
            const r = await studentFetch('/api/student/current', {});
            const d = await r.json();
            if (r.status === 401) {
                clearStudentToken();
                return;
            }
            if (d.success && d.student) {
                currentStudent = d.student;
                myClasses = await loadClasses();
                setState('home');
                document.getElementById('frontLoginBlank').classList.add('panel-hidden');
                document.getElementById('backLogin').classList.add('panel-hidden');
                document.getElementById('frontNameWrap').classList.remove('panel-hidden');
                document.getElementById('backHome').classList.remove('panel-hidden');
                document.getElementById('backSession').classList.add('panel-hidden');
                updateFrontName();
                renderClassCards();
                await ensureStudentSocketReady();
                requestJoinStudentEnrollments();
                startStudentLiveUpdates();
                syncBackStatusBarVisibility();
            }
        } catch (e) {}
    })();
})();
</script>
